<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bumi</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf4fb;
  --surface: #ffffff;
  --grid-sep: #e0d4e8;
  --text: #3a2d45;
  --sub: #b09abf;
  --accent: #9b7bb8;
}
body {
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}
header {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 10px;
}
.hdr-left { display: flex; align-items: center; gap: 8px; }
.menu-btn {
  background: none; border: none; font-size: 20px; cursor: pointer;
  color: var(--text); padding: 4px; line-height: 1;
}
h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
.hdr-right { text-align: right; }
.level-num { font-size: 16px; font-weight: 700; }
.level-diff { font-size: 12px; color: var(--sub); }

#grid-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 20px;
  width: 100%;
  max-width: 480px;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}
#grid {
  background: var(--grid-sep);
  border-radius: 10px;
  border: 2px solid var(--grid-sep);
  overflow: hidden;
  display: grid;
  gap: 1px;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
.cell {
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  cursor: crosshair;
  position: relative;
  color: var(--text);
  transition: background 0.08s;
  width: var(--cell-size, 44px);
  height: var(--cell-size, 44px);
  min-width: var(--cell-size, 44px);
  min-height: var(--cell-size, 44px);
  overflow: hidden;
  border: 1px solid transparent;
}
.cell.preview { background: rgba(155, 123, 184, 0.18); }
.cell.preview-bad { background: rgba(220, 80, 120, 0.18); }
.cell.r-placed { background: rgba(120, 100, 160, 0.06); }
.cell.r-correct { background: var(--rc, #e8d5ff); }

/* Rectangle borders */
.cell.bt { border-top:    2.5px solid var(--rb, #444); }
.cell.bb { border-bottom: 2.5px solid var(--rb, #444); }
.cell.bl { border-left:   2.5px solid var(--rb, #444); }
.cell.br { border-right:  2.5px solid var(--rb, #444); }

/* Preview borders */
.cell.pbt { border-top:    2px dashed rgba(155,123,184,.6); }
.cell.pbb { border-bottom: 2px dashed rgba(155,123,184,.6); }
.cell.pbl { border-left:   2px dashed rgba(155,123,184,.6); }
.cell.pbr { border-right:  2px dashed rgba(155,123,184,.6); }

footer {
  width: 100%;
  max-width: 480px;
  padding: 8px 16px max(env(safe-area-inset-bottom, 0px), 20px);
}
.btn-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.btn {
  background: var(--surface);
  border: 1.5px solid #e0d4e8;
  border-radius: 12px;
  padding: 10px 4px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  letter-spacing: 0.2px;
}
.btn:active { opacity: 0.65; }
.btn .icon { font-size: 19px; line-height: 1; }
.btn-wide {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  display: none;
}
.btn-wide.show { display: block; }
.btn-wide:active { opacity: 0.8; }

/* Overlays */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
}
.overlay.show { display: flex; }
.sheet {
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  padding: 10px 20px max(env(safe-area-inset-bottom, 0px), 32px);
  width: 100%;
  max-width: 480px;
}
.sheet-handle {
  width: 36px; height: 4px;
  background: #ccc; border-radius: 2px;
  margin: 0 auto 16px;
}
.sheet h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.sheet .sub { color: var(--sub); font-size: 14px; margin-bottom: 20px; }

/* Win sheet */
.win-emoji { font-size: 52px; text-align: center; margin-bottom: 12px; }
.win-actions { display: flex; gap: 10px; }
.win-actions .btn-wide { display: block; flex: 1; }
.win-actions .btn-secondary {
  flex: 0 0 auto;
  background: #ead5ff;
  color: var(--text);
  border: none;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

/* Level picker */
.level-sheet {
  max-height: 80vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.sheet-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.sheet-top-row h2 { margin-bottom: 0; }
.btn-back-menu {
  background: var(--surface);
  border: 1.5px solid #e0d4e8;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text);
}
.btn-back-menu:active { opacity: 0.65; }
/* Overall progress pill */
.path-progress-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1.5px solid #e0d4e8;
  border-radius: 30px;
  padding: 8px 16px;
  margin-bottom: 20px;
}
.path-progress-text {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
}
.path-progress-text span { color: var(--accent); }
.path-bar-wrap {
  flex: 1;
  height: 6px;
  background: #e0d4e8;
  border-radius: 3px;
  overflow: hidden;
}
.path-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* Path sections */
.path-section {
  display: flex;
  gap: 0;
}
.path-spine {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 32px;
  flex-shrink: 0;
}
.path-node {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--node-color, #e0d4e8);
  background: var(--node-color, #e0d4e8);
  flex-shrink: 0;
  margin-top: 12px;
}
.path-line {
  width: 2px;
  flex: 1;
  background: #e0d4e8;
  min-height: 12px;
}
.path-body {
  flex: 1;
  padding-bottom: 16px;
}
.path-section-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-top: 10px;
  margin-bottom: 2px;
}
.path-section-sub {
  font-size: 11px;
  color: var(--sub);
  margin-bottom: 10px;
}
.path-lvl-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.path-lvl-btn {
  aspect-ratio: 1;
  border-radius: 50%;
  border: 2px solid #e0d4e8;
  background: var(--surface);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--sub);
  transition: transform 0.1s;
}
.path-lvl-btn:active { transform: scale(0.9); }
.path-lvl-btn.done {
  border-color: var(--node-color, var(--accent));
  background: var(--node-bg, #ead5ff);
  color: var(--node-color, var(--accent));
}
.path-lvl-btn.active {
  border-color: var(--accent);
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 8px rgba(155,123,184,0.4);
}

/* Menu screen */
#menu-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  z-index: 200;
  padding: 40px 32px max(env(safe-area-inset-bottom, 0px), 40px);
}
#menu-screen.hidden { display: none; }
.menu-logo {
  font-size: 56px;
  margin-bottom: 8px;
}
.menu-title {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -1px;
  color: var(--text);
  margin-bottom: 8px;
}
.menu-sub {
  font-size: 15px;
  color: var(--sub);
  text-align: center;
  margin-bottom: 48px;
  line-height: 1.5;
  max-width: 260px;
}
.menu-how {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 48px;
  width: 100%;
  max-width: 300px;
}
.menu-how-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border-radius: 14px;
  padding: 12px 16px;
  border: 1.5px solid #e0d4e8;
}
.menu-how-icon { font-size: 22px; flex-shrink: 0; }
.menu-how-text { font-size: 13px; color: var(--text); line-height: 1.4; }
.menu-how-text strong { font-weight: 700; }
.menu-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 300px;
}
.menu-play {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 16px;
  padding: 18px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.2px;
}
.menu-play:active { opacity: 0.8; }
.menu-levels-btn {
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid #e0d4e8;
  border-radius: 16px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.menu-levels-btn:active { opacity: 0.65; }
.menu-train-btn {
  background: #ffd6e0;
  color: #b03060;
  border: 1.5px solid #ffb3c6;
  border-radius: 16px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.menu-train-btn:active { opacity: 0.65; }

/* Training badge */
.train-badge {
  display: none;
  background: #ffd6e0;
  color: #b03060;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1.5px solid #ffb3c6;
}
.train-badge.show { display: inline-block; }

/* Theme picker */
.theme-row {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  justify-content: center;
}
.theme-swatch {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.theme-swatch:active { transform: scale(0.9); }
.theme-swatch.active { border-color: var(--text); transform: scale(1.15); }
.theme-label {
  font-size: 11px;
  color: var(--sub);
  text-align: center;
  margin-bottom: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
</style>
</head>
<body>

<!-- Menu screen -->
<div id="menu-screen">
  <div class="menu-title">🌴 Bumi 🌴</div>
  <p class="menu-sub">Divide a grelha em retângulos. Cada um contém exatamente um número.</p>
  <div class="menu-how">
    <div class="menu-how-item">
      <span class="menu-how-text"><strong>Desenha</strong> retângulos arrastando o dedo</span>
    </div>
    <div class="menu-how-item">
      <span class="menu-how-text"><strong>Cada número</strong> indica a área do retângulo</span>
    </div>
    <div class="menu-how-item">
      <span class="menu-how-text"><strong>Completa níveis</strong> para ganhar hints</span>
    </div>
  </div>
  <div class="theme-label">Tema</div>
  <div class="theme-row" id="theme-row">
    <button class="theme-swatch active" style="background:#9b7bb8" data-theme="pastel" onclick="setTheme('pastel',this)" title="Lavanda"></button>
    <button class="theme-swatch" style="background:#5a9fd4" data-theme="ocean" onclick="setTheme('ocean',this)" title="Oceano"></button>
    <button class="theme-swatch" style="background:#e07060" data-theme="sunset" onclick="setTheme('sunset',this)" title="Sunset"></button>
    <button class="theme-swatch" style="background:#56a87a" data-theme="forest" onclick="setTheme('forest',this)" title="Floresta"></button>
    <button class="theme-swatch" style="background:#4a4a6a" data-theme="dark" onclick="setTheme('dark',this)" title="Escuro"></button>
  </div>
  <div class="menu-btns">
    <button class="menu-play" onclick="startGame()">Jogar →</button>
    <button class="menu-levels-btn" onclick="startAndLevels()">⊞ Escolher Nível</button>
    <button class="menu-train-btn" onclick="startTraining()">Modo Treino</button>
  </div>
</div>

<header>
  <div class="hdr-left">
    <button class="menu-btn" onclick="goToMenu()" title="Menu">⌂</button>
    <button class="menu-btn" onclick="openLevels()" title="Níveis">☰</button>
    <h1>🌴 Bumi 🌴</h1>
    <span class="train-badge" id="train-badge">Treino</span>
  </div>
  <div class="hdr-right">
    <div class="level-num">Level <span id="lvl-n">1</span></div>
    <div class="level-diff" id="lvl-diff">Easy · 5×5</div>
  </div>
</header>

<div id="grid-wrap"><div id="grid"></div></div>

<footer>
  <div class="btn-row">
    <button class="btn" onclick="doUndo()"><span class="icon">↩</span>Undo</button>
    <button class="btn" onclick="doClear()"><span class="icon">✕</span>Clear</button>
    <button class="btn" id="btn-hint" onclick="doHint()"><span class="icon">?</span><span id="hint-label">Hint · 3</span></button>
    <button class="btn" onclick="openLevels()"><span class="icon">⊞</span>Levels</button>
  </div>
  <button class="btn-wide" id="btn-next" onclick="nextLvl()">Next Level →</button>
</footer>

<!-- Win sheet -->
<div class="overlay" id="win-overlay" onclick="closeIfBg(event,'win-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 style="text-align:center">Puzzle Solved!</h2>
    <p class="sub" id="win-sub" style="text-align:center">Level 1 · Easy</p>
    <div id="hint-reward" style="display:none;text-align:center;margin-bottom:14px;font-size:14px;font-weight:600;color:#9b7bb8;">+1 Hint earned!</div>
    <div class="win-actions">
      <button class="btn-secondary" onclick="closeOverlay('win-overlay')">Review</button>
      <button class="btn-wide" onclick="nextLvlFromWin()">Next Level →</button>
    </div>
  </div>
</div>

<!-- Level picker -->
<div class="overlay" id="lvl-overlay" onclick="closeIfBg(event,'lvl-overlay')">
  <div class="sheet level-sheet" id="lvl-sheet">
    <div class="sheet-handle"></div>
    <div id="lvl-picker-content"></div>
  </div>
</div>

<script>
// ─── Seeded RNG ───────────────────────────────────────────────────────────────
class RNG {
  constructor(seed) { this.s = (seed ^ 0xdeadbeef) >>> 0; }
  next() {
    let s = this.s;
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    this.s = s >>> 0;
    return (s >>> 0) / 0x100000000;
  }
  int(a, b) { return a + Math.floor(this.next() * (b - a + 1)); }
}

// ─── Level generator (recursive partition) ────────────────────────────────────
function genLevel(seed, size, maxArea) {
  const rng = new RNG(seed);
  const rects = [];

  function place(r1, c1, r2, c2) {
    const rows = r2-r1, cols = c2-c1;
    const area = rows*cols;
    const canH = rows >= 2, canV = cols >= 2;

    if (area <= maxArea) {
      const keep = area <= 2 ? 0.88 : area <= 4 ? 0.70 : 0.50;
      if (rng.next() < keep || (!canH && !canV)) {
        rects.push({ r1, c1, r2, c2, area, cr: rng.int(r1, r2-1), cc: rng.int(c1, c2-1) });
        return;
      }
    }

    // Only split along an axis that won't produce a 1×1 sub-region.
    // H-split: each piece is (mid-r1)×cols — safe if cols>=2 (always ok)
    //          or cols=1 and rows>=4 so both halves have >=2 rows.
    // V-split: each piece is rows×(mid-c1) — safe if rows>=2
    //          or rows=1 and cols>=4.
    const safeH = canH && (cols >= 2 || rows >= 4);
    const safeV = canV && (rows >= 2 || cols >= 4);

    if (!safeH && !safeV) {
      // No safe split possible — keep as one rect
      rects.push({ r1, c1, r2, c2, area, cr: rng.int(r1, r2-1), cc: rng.int(c1, c2-1) });
      return;
    }

    if (safeH && (!safeV || rng.next() < 0.5)) {
      const lo = r1 + (cols < 2 ? 2 : 1);
      const hi = r2 - (cols < 2 ? 2 : 1);
      const mid = rng.int(lo, hi);
      place(r1, c1, mid, c2); place(mid, c1, r2, c2);
    } else {
      const lo = c1 + (rows < 2 ? 2 : 1);
      const hi = c2 - (rows < 2 ? 2 : 1);
      const mid = rng.int(lo, hi);
      place(r1, c1, r2, mid); place(r1, mid, r2, c2);
    }
  }

  place(0, 0, size, size);

  const clues = rects.map(r => ({ r: r.cr, c: r.cc, v: r.area }));
  return { size, clues, solution: rects };
}

// ─── Level config ─────────────────────────────────────────────────────────────
const DIFFS = [
  { label: 'Easy',   size: 5,  maxArea: 8,  count: 15 },
  { label: 'Easy',   size: 6,  maxArea: 9,  count: 15 },
  { label: 'Medium', size: 7,  maxArea: 9,  count: 20 },
  { label: 'Hard',   size: 8,  maxArea: 8,  count: 20 },
  { label: 'Hard',   size: 9,  maxArea: 8,  count: 15 },
  { label: 'Expert', size: 10, maxArea: 8,  count: 15 },
];

// Build level metadata array (0-indexed)
const LEVEL_META = [];
DIFFS.forEach(d => {
  for (let i = 0; i < d.count; i++)
    LEVEL_META.push({ label: d.label, size: d.size, maxArea: d.maxArea });
});

// Generate all 100 levels lazily
const LEVEL_CACHE = {};
function getLevel(idx) {
  if (!LEVEL_CACHE[idx]) {
    const m = LEVEL_META[idx];
    LEVEL_CACHE[idx] = genLevel(idx * 1031 + 7, m.size, m.maxArea);
  }
  return LEVEL_CACHE[idx];
}

// ─── Color palette (matches menu theme swatches) ──────────────────────────────
// lavanda · oceano · sunset · floresta · rosa · amarelo
const BG_PAL = [
  '#ead5ff',  // lavanda
  '#c5e3ff',  // oceano
  '#ffe2c5',  // sunset
  '#c3f0c8',  // floresta
  '#ffd6e0',  // rosa
  '#fff0a0',  // amarelo
];
const BD_PAL = [
  '#9b7bb8',  // lavanda
  '#5a9fd4',  // oceano
  '#e07060',  // sunset
  '#56a87a',  // floresta
  '#e08898',  // rosa
  '#c8a030',  // amarelo
];

// ─── Game state ───────────────────────────────────────────────────────────────
let curLvl = 0;
let lvl    = null;
let placed = [];
let drawing = null;
let pid    = null;
let onRect = -1;
let colorN = 0;
const solved = new Set();
let hints  = 3;
let trainingMode = false;

function updateHintBtn() {
  if (trainingMode) {
    document.getElementById('hint-label').textContent = 'Hint · ∞';
    const btn = document.getElementById('btn-hint');
    btn.disabled = false;
    btn.style.opacity = '';
  } else {
    document.getElementById('hint-label').textContent = `Hint · ${hints}`;
    const btn = document.getElementById('btn-hint');
    btn.disabled = hints <= 0;
    btn.style.opacity = hints <= 0 ? '0.4' : '';
  }
}
let cellEls  = [];

// ─── Grid rendering ───────────────────────────────────────────────────────────
function renderGrid() {
  const g = document.getElementById('grid');
  const wrap = document.getElementById('grid-wrap');
  g.innerHTML = '';
  cellEls = [];
  const { size } = lvl;

  // Fixed cell size: fill available space but never smaller than 32px
  const available = Math.min(wrap.clientWidth - 24, wrap.clientHeight - 24, 440);
  const cellPx = Math.max(32, Math.floor((available - size - 2) / size));
  document.documentElement.style.setProperty('--cell-size', cellPx + 'px');

  g.style.gridTemplateColumns = `repeat(${size}, var(--cell-size, 44px))`;
  g.style.gridTemplateRows    = `repeat(${size}, var(--cell-size, 44px))`;

  const fs = cellPx >= 40 ? '17px' : cellPx >= 36 ? '14px' : cellPx >= 32 ? '12px' : '11px';

  for (let r = 0; r < size; r++) {
    cellEls[r] = [];
    for (let c = 0; c < size; c++) {
      const div = document.createElement('div');
      div.className = 'cell';
      div.dataset.r = r;
      div.dataset.c = c;
      div.style.fontSize = fs;
      const cl = clueAt(r, c);
      if (cl && cl.v > 1) div.textContent = cl.v;
      g.appendChild(div);
      cellEls[r][c] = div;
    }
  }
}

function clueAt(r, c) {
  return lvl.clues.find(cl => cl.r === r && cl.c === c) || null;
}

// ─── Update cell visuals ──────────────────────────────────────────────────────
function updateCells() {
  const { size } = lvl;
  // Reset
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const el = cellEls[r][c];
      const cl = clueAt(r, c);
      el.className = 'cell';
      el.textContent = cl ? cl.v : '';
      el.style.removeProperty('--rc');
      el.style.removeProperty('--rb');
    }
  }

  // Placed rects
  for (const rect of placed) {
    const { r1, c1, r2, c2, ci } = rect;
    const ok = rectOk(rect);
    const bg = BG_PAL[ci % BG_PAL.length];
    const bd = BD_PAL[ci % BD_PAL.length];
    for (let r = r1; r < r2; r++) {
      for (let c = c1; c < c2; c++) {
        const el = cellEls[r][c];
        if (ok) {
          el.classList.add('r-correct');
          el.style.setProperty('--rc', bg);
        } else {
          el.classList.add('r-placed');
        }
        el.style.setProperty('--rb', bd);
        if (r === r1)   el.classList.add('bt');
        if (r === r2-1) el.classList.add('bb');
        if (c === c1)   el.classList.add('bl');
        if (c === c2-1) el.classList.add('br');
      }
    }
  }

  // Preview
  if (drawing) {
    const p = previewCoords();
    for (let r = p.r1; r < p.r2; r++) {
      for (let c = p.c1; c < p.c2; c++) {
        const el = cellEls[r][c];
        const occupied = el.classList.contains('r-placed') || el.classList.contains('r-correct');
        el.classList.add(occupied ? 'preview-bad' : 'preview');
        if (r === p.r1)   el.classList.add('pbt');
        if (r === p.r2-1) el.classList.add('pbb');
        if (c === p.c1)   el.classList.add('pbl');
        if (c === p.c2-1) el.classList.add('pbr');
      }
    }
  }
}

function previewCoords() {
  const { sr, sc, cr, cc } = drawing;
  return {
    r1: Math.min(sr, cr), c1: Math.min(sc, cc),
    r2: Math.max(sr, cr)+1, c2: Math.max(sc, cc)+1,
  };
}

// ─── Rect helpers ─────────────────────────────────────────────────────────────
function rectOk(rect) {
  const { r1, c1, r2, c2 } = rect;
  const area = (r2-r1)*(c2-c1);
  let n = 0, v = 0;
  for (const cl of lvl.clues) {
    if (cl.r >= r1 && cl.r < r2 && cl.c >= c1 && cl.c < c2) { n++; v = cl.v; }
  }
  return n === 1 && area === v;
}

function rectsOverlap(a, b) {
  return !(a.r2 <= b.r1 || b.r2 <= a.r1 || a.c2 <= b.c1 || b.c2 <= a.c1);
}

function tryPlace(r1, c1, r2, c2) {
  const nr = { r1, c1, r2, c2, ci: colorN++ };
  for (const p of placed) if (rectsOverlap(nr, p)) return false;
  placed.push(nr);
  return true;
}

// ─── Win check ────────────────────────────────────────────────────────────────
function checkWin() {
  if (!placed.length) return false;
  const { size } = lvl;
  const cov = Array.from({length: size}, () => Array(size).fill(false));
  for (const rect of placed) {
    if (!rectOk(rect)) return false;
    const { r1, c1, r2, c2 } = rect;
    for (let r = r1; r < r2; r++)
      for (let c = c1; c < c2; c++)
        cov[r][c] = true;
  }
  for (let r = 0; r < size; r++)
    for (let c = 0; c < size; c++)
      if (!cov[r][c]) return false;
  return true;
}

// ─── Pointer events ───────────────────────────────────────────────────────────
function posFromEvent(e) {
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (!el || !el.dataset.r) return null;
  return { r: +el.dataset.r, c: +el.dataset.c };
}

document.getElementById('grid').addEventListener('pointerdown', e => {
  e.preventDefault();
  const pos = posFromEvent(e);
  if (!pos) return;
  onRect = placed.findIndex(rect =>
    pos.r >= rect.r1 && pos.r < rect.r2 && pos.c >= rect.c1 && pos.c < rect.c2
  );
  pid = e.pointerId;
  document.getElementById('grid').setPointerCapture(e.pointerId);
  drawing = { sr: pos.r, sc: pos.c, cr: pos.r, cc: pos.c };
  updateCells();
});

document.getElementById('grid').addEventListener('pointermove', e => {
  if (!drawing || e.pointerId !== pid) return;
  e.preventDefault();
  const pos = posFromEvent(e);
  if (!pos || (pos.r === drawing.cr && pos.c === drawing.cc)) return;
  drawing.cr = pos.r; drawing.cc = pos.c;
  updateCells();
});

document.getElementById('grid').addEventListener('pointerup', e => {
  if (!drawing || e.pointerId !== pid) return;
  e.preventDefault();
  const p = previewCoords();
  const isTap = p.r2-p.r1 === 1 && p.c2-p.c1 === 1;

  if (isTap && onRect >= 0) {
    placed.splice(onRect, 1);
  } else {
    tryPlace(p.r1, p.c1, p.r2, p.c2);
  }

  drawing = null; pid = null; onRect = -1;
  updateCells();

  if (checkWin()) {
    markWin();
  }
});

document.getElementById('grid').addEventListener('pointercancel', () => {
  drawing = null; pid = null; onRect = -1;
  updateCells();
});

// ─── Controls ─────────────────────────────────────────────────────────────────
function doUndo() {
  placed.pop();
  updateCells();
}

function doClear() {
  placed = []; colorN = 0;
  updateCells();
}

function doHint() {
  if (!trainingMode && hints <= 0) return;
  const avail = lvl.solution.filter(sol => {
    const s = { r1: sol.r1, c1: sol.c1, r2: sol.r2, c2: sol.c2 };
    return !placed.some(p => rectsOverlap(s, p));
  });
  if (!avail.length) return;
  if (!trainingMode) { hints--; updateHintBtn(); }
  const pick = avail[Math.floor(Math.random() * avail.length)];
  placed.push({ r1: pick.r1, c1: pick.c1, r2: pick.r2, c2: pick.c2, ci: colorN++ });
  updateCells();
  if (checkWin()) { markWin(); }
}

function markWin() {
  const isNew = !solved.has(curLvl);
  if (!trainingMode) {
    solved.add(curLvl);
    if (isNew) { hints++; updateHintBtn(); }
  }
  updateLevelPicker();
  document.getElementById('btn-next').classList.add('show');
  setTimeout(() => showWin(isNew && !trainingMode), 350);
}

// ─── Level loading ────────────────────────────────────────────────────────────
function loadLvl(idx) {
  curLvl = idx;
  lvl = getLevel(idx);
  placed = []; drawing = null; colorN = 0; pid = null; onRect = -1;
  const m = LEVEL_META[idx];
  document.getElementById('lvl-n').textContent = idx + 1;
  document.getElementById('lvl-diff').textContent = `${m.label} · ${m.size}×${m.size}`;
  document.getElementById('btn-next').classList.remove('show');
  renderGrid();
  updateCells();
  closeOverlay('lvl-overlay');
}

function nextLvl() {
  if (curLvl < 99) loadLvl(curLvl + 1);
}

function nextLvlFromWin() {
  closeOverlay('win-overlay');
  nextLvl();
}

// ─── Win overlay ──────────────────────────────────────────────────────────────
function showWin(earnedHint) {
  const m = LEVEL_META[curLvl];
  document.getElementById('win-sub').textContent = `Level ${curLvl+1} · ${m.label}`;
  const reward = document.getElementById('hint-reward');
  reward.style.display = earnedHint ? 'block' : 'none';
  document.getElementById('win-overlay').classList.add('show');
}

// ─── Level picker ─────────────────────────────────────────────────────────────
function openLevels() {
  updateLevelPicker();
  document.getElementById('lvl-overlay').classList.add('show');
}

function updateLevelPicker() {
  const cont = document.getElementById('lvl-picker-content');
  cont.innerHTML = '';

  // ── Top row: title + back to menu ──
  const topRow = document.createElement('div');
  topRow.className = 'sheet-top-row';
  const title = document.createElement('h2');
  title.textContent = 'Caminho';
  const backBtn = document.createElement('button');
  backBtn.className = 'btn-back-menu';
  backBtn.textContent = '⌂ Menu';
  backBtn.onclick = () => { closeOverlay('lvl-overlay'); goToMenu(); };
  topRow.appendChild(title);
  topRow.appendChild(backBtn);
  cont.appendChild(topRow);

  // ── Overall progress pill ──
  const totalDone = solved.size;
  const total = LEVEL_META.length;
  const pill = document.createElement('div');
  pill.className = 'path-progress-pill';
  pill.innerHTML = `
    <div class="path-progress-text"><span>${totalDone}</span> / ${total}</div>
    <div class="path-bar-wrap"><div class="path-bar-fill" style="width:${(totalDone/total)*100}%"></div></div>
  `;
  cont.appendChild(pill);

  // Tropical island names per difficulty section
  const ISLAND_NAMES = [
    { name: 'Praia',   sub: 'Areias tranquilas' },
    { name: 'Lagoa',   sub: 'Águas cristalinas' },
    { name: 'Selva',   sub: 'Palmeiras densas' },
    { name: 'Vulcão',  sub: 'Terreno acidentado' },
    { name: 'Pico',    sub: 'Ventos selvagens' },
    { name: 'Paraíso', sub: 'Apenas os melhores chegam' },
  ];

  // Colors per difficulty section
  const SECTION_COLORS = [
    { color: '#56a87a', bg: '#c3f0c8' },
    { color: '#5a9fd4', bg: '#c5e3ff' },
    { color: '#9b7bb8', bg: '#ead5ff' },
    { color: '#e07060', bg: '#ffe2c5' },
    { color: '#c8a030', bg: '#fff0a0' },
    { color: '#e08898', bg: '#ffd6e0' },
  ];

  // ── Path ──
  let idx = 0;
  DIFFS.forEach((d, di) => {
    const sc = SECTION_COLORS[di] || SECTION_COLORS[0];
    const isLast = di === DIFFS.length - 1;

    let doneCount = 0;
    for (let i = 0; i < d.count; i++) { if (solved.has(idx + i)) doneCount++; }

    const section = document.createElement('div');
    section.className = 'path-section';

    // Spine: node + line
    const spine = document.createElement('div');
    spine.className = 'path-spine';
    const node = document.createElement('div');
    node.className = 'path-node';
    node.style.setProperty('--node-color', sc.color);
    node.style.background = doneCount === d.count ? sc.color : sc.bg;
    node.style.borderColor = sc.color;
    spine.appendChild(node);
    if (!isLast) {
      const line = document.createElement('div');
      line.className = 'path-line';
      spine.appendChild(line);
    }

    // Body: label + level circles
    const body = document.createElement('div');
    body.className = 'path-body';

    const lbl = document.createElement('div');
    lbl.className = 'path-section-label';
    const island = ISLAND_NAMES[di] || { name: d.label, sub: '' };
    lbl.textContent = `${island.name} · ${d.size}×${d.size}`;

    const sub = document.createElement('div');
    sub.className = 'path-section-sub';
    sub.textContent = `${island.sub} · ${doneCount}/${d.count} ilhas`;

    const grid = document.createElement('div');
    grid.className = 'path-lvl-grid';
    grid.style.setProperty('--node-color', sc.color);
    grid.style.setProperty('--node-bg', sc.bg);

    for (let i = 0; i < d.count; i++) {
      const btn = document.createElement('button');
      btn.className = 'path-lvl-btn';
      if (idx === curLvl) btn.classList.add('active');
      else if (solved.has(idx)) btn.classList.add('done');
      btn.textContent = idx + 1;
      const ii = idx;
      btn.onclick = () => loadLvl(ii);
      grid.appendChild(btn);
      idx++;
    }

    body.appendChild(lbl);
    body.appendChild(sub);
    body.appendChild(grid);
    section.appendChild(spine);
    section.appendChild(body);
    cont.appendChild(section);
  });
}

// ─── Overlay helpers ──────────────────────────────────────────────────────────
function closeOverlay(id) {
  document.getElementById(id).classList.remove('show');
}

function closeIfBg(e, id) {
  if (e.target === document.getElementById(id)) closeOverlay(id);
}

// ─── Menu ─────────────────────────────────────────────────────────────────────
function startGame() {
  trainingMode = false;
  document.getElementById('train-badge').classList.remove('show');
  document.getElementById('menu-screen').classList.add('hidden');
  updateHintBtn();
}

function startAndLevels() {
  trainingMode = false;
  document.getElementById('train-badge').classList.remove('show');
  document.getElementById('menu-screen').classList.add('hidden');
  updateHintBtn();
  openLevels();
}

function startTraining() {
  trainingMode = true;
  document.getElementById('train-badge').classList.add('show');
  document.getElementById('menu-screen').classList.add('hidden');
  loadLvl(0);
  updateHintBtn();
}

function goToMenu() {
  closeOverlay('win-overlay');
  closeOverlay('lvl-overlay');
  document.getElementById('menu-screen').classList.remove('hidden');
}

// ─── Themes ───────────────────────────────────────────────────────────────────
const THEMES = {
  pastel: {
    '--bg': '#faf4fb', '--surface': '#ffffff', '--grid-sep': '#e0d4e8',
    '--text': '#3a2d45', '--sub': '#b09abf', '--accent': '#9b7bb8',
  },
  ocean: {
    '--bg': '#f0f7fb', '--surface': '#ffffff', '--grid-sep': '#c0d8ea',
    '--text': '#1a3045', '--sub': '#7aaabf', '--accent': '#3a80b8',
  },
  sunset: {
    '--bg': '#fdf5f0', '--surface': '#ffffff', '--grid-sep': '#e8c8b8',
    '--text': '#3a1a0a', '--sub': '#c09080', '--accent': '#e07060',
  },
  forest: {
    '--bg': '#f2faf5', '--surface': '#ffffff', '--grid-sep': '#b8ddc8',
    '--text': '#1a3025', '--sub': '#70a888', '--accent': '#3a8860',
  },
  dark: {
    '--bg': '#1e1e2e', '--surface': '#2a2a3e', '--grid-sep': '#3a3a54',
    '--text': '#d0d0e8', '--sub': '#7070a0', '--accent': '#9070d0',
  },
};

function setTheme(name, el) {
  const t = THEMES[name];
  if (!t) return;
  const root = document.documentElement;
  for (const [k, v] of Object.entries(t)) root.style.setProperty(k, v);
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
  localStorage.setItem('bumi-theme', name);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
const savedTheme = localStorage.getItem('bumi-theme') || 'pastel';
const savedSwatch = document.querySelector(`[data-theme="${savedTheme}"]`);
setTheme(savedTheme, savedSwatch);
loadLvl(0);
updateHintBtn();
</script>
